name: Client (TypeScript) CI

on:
  pull_request:
    paths:
      - "clients/typescript/**"
      - ".github/workflows/client-typescript-ci.yml"
  push:
    branches: [main]
    paths:
      - "clients/typescript/**"
      - ".github/workflows/client-typescript-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Build + test
        run: npm test
