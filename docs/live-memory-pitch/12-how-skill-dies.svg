<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="'Kalam','Caveat','Patrick Hand','Comic Sans MS',cursive">
  <defs>
    <radialGradient id="goldFade12" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#FFF7B0" stop-opacity="0.5"/>
      <stop offset="60%"  stop-color="#F7B538" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="goldFull12" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#FFF7B0"/>
      <stop offset="60%"  stop-color="#F7B538"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>
    <linearGradient id="stale12" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="quarantine12" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="reject12" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="deprecate12" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <marker id="arr12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#F7B538"/>
    </marker>
    <marker id="redArr12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="#0B1020"/>

  <!-- Title -->
  <text x="700" y="58" text-anchor="middle" font-size="40" fill="#FFF8E7" font-weight="700">How a Skill Dies</text>
  <text x="700" y="92" text-anchor="middle" font-size="22" fill="#F7B538" font-style="italic">retirement isn't deletion — every fate preserves provenance</text>

  <!-- =================== Top — once-active skill =================== -->
  <g transform="translate(640,140)">
    <rect x="0" y="0" width="120" height="160" rx="6" fill="url(#goldFade12)" stroke="#7C2D12" stroke-width="3" stroke-dasharray="6 3"/>
    <line x1="0" y1="42" x2="120" y2="42" stroke="#7C2D12" stroke-width="1.5"/>
    <text x="60" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#7C2D12">deploy-</text>
    <text x="60" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#7C2D12">eu-west</text>
    <text x="60" y="115" text-anchor="middle" font-size="40" fill="#7C2D12" font-weight="700" opacity="0.6">★</text>
    <text x="60" y="148" text-anchor="middle" font-size="14" fill="#7C2D12">once-active</text>

    <text x="60" y="-10" text-anchor="middle" font-size="20" fill="#FFE066" font-style="italic">a skill that used to ship</text>
  </g>

  <!-- =================== Middle — fading signals =================== -->
  <g transform="translate(0,320)">
    <text x="700" y="0" text-anchor="middle" font-size="24" fill="#94A3B8" font-weight="700">decay signals accumulate</text>
    <text x="700" y="26" text-anchor="middle" font-size="15" fill="#64748B" font-style="italic">no one event kills a skill · evidence piles up</text>

    <!-- 4 signal cards -->
    <g transform="translate(80,50)">
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#1E293B" stroke="#EF4444" stroke-width="2"/>
      <text x="140" y="25" text-anchor="middle" font-size="16" fill="#EF4444" font-weight="700">contradictions</text>
      <text x="140" y="48" text-anchor="middle" font-size="13" fill="#FFF8E7">new memories supersede</text>
      <text x="140" y="65" text-anchor="middle" font-size="13" fill="#FFF8E7">the procedure's premises</text>
      <text x="140" y="82" text-anchor="middle" font-size="12" fill="#94A3B8" font-style="italic">"region migrated to eu-west-2"</text>
    </g>

    <g transform="translate(400,50)">
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
      <text x="140" y="25" text-anchor="middle" font-size="16" fill="#F59E0B" font-weight="700">failed evolves</text>
      <text x="140" y="48" text-anchor="middle" font-size="13" fill="#FFF8E7">agents recall it · try it ·</text>
      <text x="140" y="65" text-anchor="middle" font-size="13" fill="#FFF8E7">report outcome=failure</text>
      <text x="140" y="82" text-anchor="middle" font-size="12" fill="#94A3B8" font-style="italic">memclaw_evolve(failure) ×3</text>
    </g>

    <g transform="translate(720,50)">
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#1E293B" stroke="#94A3B8" stroke-width="2"/>
      <text x="140" y="25" text-anchor="middle" font-size="16" fill="#94A3B8" font-weight="700">no recalls</text>
      <text x="140" y="48" text-anchor="middle" font-size="13" fill="#FFF8E7">90 days · zero op=search</text>
      <text x="140" y="65" text-anchor="middle" font-size="13" fill="#FFF8E7">hits · zero invocations</text>
      <text x="140" y="82" text-anchor="middle" font-size="12" fill="#94A3B8" font-style="italic">recall_count flat at 0</text>
    </g>

    <g transform="translate(1040,50)">
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#1E293B" stroke="#DC2626" stroke-width="2"/>
      <text x="140" y="25" text-anchor="middle" font-size="16" fill="#DC2626" font-weight="700">sentinel rescan flags</text>
      <text x="140" y="48" text-anchor="middle" font-size="13" fill="#FFF8E7">a finding appears that</text>
      <text x="140" y="65" text-anchor="middle" font-size="13" fill="#FFF8E7">wasn't there at write-time</text>
      <text x="140" y="82" text-anchor="middle" font-size="12" fill="#94A3B8" font-style="italic">CVE in a referenced script</text>
    </g>
  </g>

  <!-- arrow from skill down to signals -->
  <line x1="700" y1="300" x2="700" y2="320" stroke="#94A3B8" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- arrow from signals down to fates row -->
  <line x1="700" y1="475" x2="700" y2="525" stroke="#F7B538" stroke-width="3" marker-end="url(#arr12)"/>

  <!-- =================== Bottom — four terminal fates =================== -->
  <g transform="translate(0,540)">
    <text x="700" y="0" text-anchor="middle" font-size="24" fill="#FFE066" font-weight="700">four fates · the lifecycle's terminal states</text>

    <!-- STALE -->
    <g transform="translate(60,30)">
      <rect x="0" y="0" width="290" height="240" rx="14" fill="url(#stale12)" opacity="0.95" stroke="#475569" stroke-width="3"/>
      <text x="145" y="36" text-anchor="middle" font-size="22" fill="#FFF8E7" font-weight="700">stale</text>
      <text x="145" y="58" text-anchor="middle" font-size="13" fill="#E2E8F0" font-style="italic">faded — not deleted</text>

      <!-- icon: faded book -->
      <rect x="105" y="78" width="80" height="100" rx="5" fill="#FFF8E7" stroke="#475569" stroke-width="2" opacity="0.55"/>
      <line x1="105" y1="106" x2="185" y2="106" stroke="#475569" stroke-width="1.5" opacity="0.55"/>
      <text x="145" y="146" text-anchor="middle" font-size="26" fill="#475569" font-weight="700" opacity="0.6">★</text>

      <g font-size="13" fill="#FFF8E7" transform="translate(20,196)">
        <text x="0" y="0" font-weight="700" fill="#FFE066">trigger</text>
        <text x="0" y="18">no recalls + no reinforce for N days</text>
        <text x="0" y="36" font-weight="700" fill="#FFE066">verdict</text>
        <text x="0" y="54">drops from plugin reconciliation</text>
      </g>
    </g>

    <!-- DEPRECATED -->
    <g transform="translate(380,30)">
      <rect x="0" y="0" width="290" height="240" rx="14" fill="url(#deprecate12)" stroke="#5B21B6" stroke-width="3"/>
      <text x="145" y="36" text-anchor="middle" font-size="22" fill="#FFF8E7" font-weight="700">deprecated</text>
      <text x="145" y="58" text-anchor="middle" font-size="13" fill="#E0E7FF" font-style="italic">explicit retirement</text>

      <!-- icon: crossed-out book -->
      <rect x="105" y="78" width="80" height="100" rx="5" fill="#FFF8E7" stroke="#5B21B6" stroke-width="2"/>
      <line x1="105" y1="106" x2="185" y2="106" stroke="#5B21B6" stroke-width="1.5"/>
      <text x="145" y="146" text-anchor="middle" font-size="26" fill="#7C3AED" font-weight="700">★</text>
      <line x1="95" y1="80" x2="195" y2="178" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>

      <g font-size="13" fill="#FFF8E7" transform="translate(20,196)">
        <text x="0" y="0" font-weight="700" fill="#FFE066">trigger</text>
        <text x="0" y="18">superseded by a new skill, or</text>
        <text x="0" y="36">an admin retires it explicitly</text>
        <text x="0" y="56" font-weight="700" fill="#FFE066">verdict</text>
        <text x="0" y="74">stays queryable · marked retired</text>
      </g>
    </g>

    <!-- QUARANTINED -->
    <g transform="translate(700,30)">
      <rect x="0" y="0" width="290" height="240" rx="14" fill="url(#quarantine12)" stroke="#92400E" stroke-width="3"/>
      <text x="145" y="36" text-anchor="middle" font-size="22" fill="#FFF8E7" font-weight="700">quarantined</text>
      <text x="145" y="58" text-anchor="middle" font-size="13" fill="#FEF3C7" font-style="italic">held for security review</text>

      <!-- icon: locked book -->
      <rect x="105" y="78" width="80" height="100" rx="5" fill="#FFF8E7" stroke="#92400E" stroke-width="2"/>
      <line x1="105" y1="106" x2="185" y2="106" stroke="#92400E" stroke-width="1.5"/>
      <text x="145" y="146" text-anchor="middle" font-size="26" fill="#92400E" font-weight="700">★</text>
      <!-- padlock -->
      <rect x="135" y="118" width="20" height="16" rx="2" fill="#92400E"/>
      <path d="M 138 118 L 138 110 Q 138 102 145 102 Q 152 102 152 110 L 152 118" fill="none" stroke="#92400E" stroke-width="2.5"/>

      <g font-size="13" fill="#FFF8E7" transform="translate(20,196)">
        <text x="0" y="0" font-weight="700" fill="#FFE066">trigger</text>
        <text x="0" y="18">sentinel rescan finds critical issue</text>
        <text x="0" y="36">(prompt-injection / shell-inject / CVE)</text>
        <text x="0" y="56" font-weight="700" fill="#FFE066">verdict</text>
        <text x="0" y="74">frozen — reversible by security admin</text>
      </g>
    </g>

    <!-- REJECTED -->
    <g transform="translate(1020,30)">
      <rect x="0" y="0" width="290" height="240" rx="14" fill="url(#reject12)" stroke="#7F1D1D" stroke-width="3"/>
      <text x="145" y="36" text-anchor="middle" font-size="22" fill="#FFF8E7" font-weight="700">rejected</text>
      <text x="145" y="58" text-anchor="middle" font-size="13" fill="#FEE2E2" font-style="italic">poisoned · won't re-mine</text>

      <!-- icon: rejected book with skull-ish marker -->
      <rect x="105" y="78" width="80" height="100" rx="5" fill="#FFF8E7" stroke="#7F1D1D" stroke-width="2"/>
      <line x1="105" y1="106" x2="185" y2="106" stroke="#7F1D1D" stroke-width="1.5"/>
      <text x="145" y="146" text-anchor="middle" font-size="26" fill="#7F1D1D" font-weight="700">★</text>
      <!-- poison drip -->
      <circle cx="180" cy="80" r="14" fill="#7F1D1D" stroke="#FFF8E7" stroke-width="2"/>
      <text x="180" y="86" text-anchor="middle" font-size="16" fill="#FFF8E7" font-weight="700">☠</text>

      <g font-size="13" fill="#FFF8E7" transform="translate(20,196)">
        <text x="0" y="0" font-weight="700" fill="#FFE066">trigger</text>
        <text x="0" y="18">operator rejects in the inbox</text>
        <text x="0" y="36" font-weight="700" fill="#FFE066">verdict</text>
        <text x="0" y="54">fingerprint poisoned for cooloff_days</text>
        <text x="0" y="72">forge won't re-derive this cluster</text>
      </g>
    </g>
  </g>

  <!-- =================== Footer band — what dying actually means =================== -->
  <g transform="translate(0,825)">
    <rect x="60" y="0" width="1280" height="80" rx="14" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <text x="700" y="32" text-anchor="middle" font-size="18" fill="#FFE066" font-weight="700">dying ≠ deletion</text>
    <text x="700" y="56" text-anchor="middle" font-size="15" fill="#CBD5E1">
      the doc stays · the audit trail stays · the rollback row stays — only ``status`` changes
    </text>
  </g>
</svg>
