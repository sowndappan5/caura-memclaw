<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="'Kalam','Caveat','Patrick Hand','Comic Sans MS',cursive">
  <defs>
    <radialGradient id="lake09" cx="50%" cy="55%" r="65%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </radialGradient>
    <radialGradient id="forge09" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="60%"  stop-color="#F97316"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </radialGradient>
    <linearGradient id="safety09" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="inbox09" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="gold09" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#FFF7B0"/>
      <stop offset="60%"  stop-color="#F7B538"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>
    <marker id="arr09" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#F7B538"/>
    </marker>
  </defs>

  <rect width="1400" height="880" fill="#0B1020"/>

  <!-- Title -->
  <text x="700" y="64" text-anchor="middle" font-size="42" fill="#FFF8E7" font-weight="700">How a Skill is Born</text>
  <text x="700" y="100" text-anchor="middle" font-size="22" fill="#F7B538" font-style="italic">from raw work, to a procedure every agent can use</text>

  <!-- Sub-caption -->
  <text x="700" y="138" text-anchor="middle" font-size="18" fill="#94A3B8">six stations · one skill emerges</text>

  <!-- =================== Station coords (centers) =================== -->
  <!-- 1. Lake (x≈140), 2. Outcome (x≈340), 3. Forge (x≈580), 4. Safety (x≈830), 5. Inbox (x≈1070), 6. Active (x≈1290) -->

  <!-- ====== Connecting flow line ====== -->
  <line x1="120" y1="430" x2="1280" y2="430" stroke="#334155" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- =================== STATION 1 — LAKE =================== -->
  <g transform="translate(40,260)">
    <ellipse cx="100" cy="170" rx="100" ry="90" fill="url(#lake09)" stroke="#0C4A6E" stroke-width="3"/>
    <!-- 4 agent memory dots -->
    <circle cx="65"  cy="135" r="8" fill="#FFF8E7" stroke="#0C4A6E" stroke-width="1.5"/>
    <circle cx="110" cy="118" r="8" fill="#FFF8E7" stroke="#0C4A6E" stroke-width="1.5"/>
    <circle cx="145" cy="155" r="8" fill="#FFF8E7" stroke="#0C4A6E" stroke-width="1.5"/>
    <circle cx="85"  cy="195" r="8" fill="#FFF8E7" stroke="#0C4A6E" stroke-width="1.5"/>
    <circle cx="135" cy="210" r="8" fill="#FFF8E7" stroke="#0C4A6E" stroke-width="1.5"/>
    <circle cx="70"  cy="220" r="6" fill="#FFF8E7" opacity="0.6"/>
    <circle cx="155" cy="195" r="6" fill="#FFF8E7" opacity="0.6"/>
    <!-- label -->
    <text x="100" y="-20" text-anchor="middle" font-size="28" fill="#22D3EE" font-weight="700">① The Lake</text>
    <text x="100" y="285" text-anchor="middle" font-size="17" fill="#CBD5E1">agents do work</text>
    <text x="100" y="307" text-anchor="middle" font-size="17" fill="#CBD5E1">memories flow in</text>
    <!-- status pill -->
    <rect x="20" y="335" width="160" height="34" rx="17" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="358" text-anchor="middle" font-size="15" fill="#94A3B8" font-style="italic">no skill yet</text>
  </g>

  <!-- arrow 1→2 -->
  <line x1="200" y1="430" x2="280" y2="430" stroke="#F7B538" stroke-width="3" marker-end="url(#arr09)"/>

  <!-- =================== STATION 2 — OUTCOME INFERENCE =================== -->
  <g transform="translate(290,260)">
    <rect x="0" y="80" width="180" height="180" rx="14" fill="#0F172A" stroke="#06B6D4" stroke-width="3"/>
    <!-- 6 signal chips arranged 2x3 -->
    <g font-size="14" fill="#FFF8E7">
      <g><rect x="14"  y="100" width="76" height="30" rx="6" fill="#075985" stroke="#06B6D4"/>
         <text x="52"  y="120" text-anchor="middle">contradict</text></g>
      <g><rect x="94"  y="100" width="76" height="30" rx="6" fill="#075985" stroke="#06B6D4"/>
         <text x="132" y="120" text-anchor="middle">supersede</text></g>
      <g><rect x="14"  y="145" width="76" height="30" rx="6" fill="#075985" stroke="#06B6D4"/>
         <text x="52"  y="165" text-anchor="middle">re-recall</text></g>
      <g><rect x="94"  y="145" width="76" height="30" rx="6" fill="#15803D" stroke="#22C55E"/>
         <text x="132" y="165" text-anchor="middle">"shipped!"</text></g>
      <g><rect x="14"  y="190" width="76" height="30" rx="6" fill="#075985" stroke="#06B6D4"/>
         <text x="52"  y="210" text-anchor="middle">cross-agent</text></g>
      <g><rect x="94"  y="190" width="76" height="30" rx="6" fill="#7F1D1D" stroke="#EF4444"/>
         <text x="132" y="210" text-anchor="middle">"blocked"</text></g>
    </g>
    <text x="90" y="-20" text-anchor="middle" font-size="28" fill="#06B6D4" font-weight="700">② Outcome</text>
    <text x="90" y="10"  text-anchor="middle" font-size="22" fill="#06B6D4" font-weight="700">Inference</text>
    <text x="90" y="285" text-anchor="middle" font-size="17" fill="#CBD5E1">6 free signals</text>
    <text x="90" y="307" text-anchor="middle" font-size="17" fill="#CBD5E1">label every trace</text>
    <rect x="10" y="335" width="160" height="34" rx="17" fill="#1E293B" stroke="#06B6D4" stroke-width="1.5"/>
    <text x="90" y="358" text-anchor="middle" font-size="15" fill="#06B6D4" font-style="italic">trace · labeled</text>
  </g>

  <!-- arrow 2→3 -->
  <line x1="480" y1="430" x2="555" y2="430" stroke="#F7B538" stroke-width="3" marker-end="url(#arr09)"/>

  <!-- =================== STATION 3 — FORGE =================== -->
  <g transform="translate(560,260)">
    <ellipse cx="120" cy="170" rx="120" ry="100" fill="url(#forge09)" stroke="#7C2D12" stroke-width="3"/>
    <!-- inside: 3 trace shapes merging into one star -->
    <g opacity="0.9">
      <circle cx="70"  cy="130" r="10" fill="#FFF8E7" stroke="#7C2D12"/>
      <circle cx="100" cy="118" r="10" fill="#FFF8E7" stroke="#7C2D12"/>
      <circle cx="130" cy="135" r="10" fill="#FFF8E7" stroke="#7C2D12"/>
      <line x1="70"  y1="130" x2="120" y2="180" stroke="#7C2D12" stroke-width="2"/>
      <line x1="100" y1="118" x2="120" y2="180" stroke="#7C2D12" stroke-width="2"/>
      <line x1="130" y1="135" x2="120" y2="180" stroke="#7C2D12" stroke-width="2"/>
    </g>
    <!-- fingerprint + LLM ✨ -->
    <polygon points="120,170 130,195 158,200 137,218 144,245 120,232 96,245 103,218 82,200 110,195"
             fill="#FFE066" stroke="#7C2D12" stroke-width="2"/>
    <text x="120" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#7C2D12">fp:v1</text>
    <text x="120" y="-20" text-anchor="middle" font-size="28" fill="#FB923C" font-weight="700">③ The Forge</text>
    <text x="120" y="10"  text-anchor="middle" font-size="20" fill="#FB923C">cluster · distill</text>
    <text x="120" y="285" text-anchor="middle" font-size="17" fill="#CBD5E1">repeated procedures</text>
    <text x="120" y="307" text-anchor="middle" font-size="17" fill="#CBD5E1">→ LLM drafts a skill</text>
    <rect x="30" y="335" width="180" height="34" rx="17" fill="#1E293B" stroke="#FB923C" stroke-width="1.5"/>
    <text x="120" y="358" text-anchor="middle" font-size="15" fill="#FB923C" font-style="italic" font-weight="700">candidate</text>
  </g>

  <!-- arrow 3→4 -->
  <line x1="800" y1="430" x2="855" y2="430" stroke="#F7B538" stroke-width="3" marker-end="url(#arr09)"/>

  <!-- =================== STATION 4 — SAFETY GATES =================== -->
  <g transform="translate(840,260)">
    <!-- Shield -->
    <path d="M 90 80 L 170 100 L 170 200 Q 170 260 90 290 Q 10 260 10 200 L 10 100 Z"
          fill="url(#safety09)" stroke="#14532D" stroke-width="3"/>
    <!-- Checkmark inside -->
    <polyline points="40,180 80,220 145,150" fill="none" stroke="#FFF8E7" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sentinel + poison sub-labels -->
    <text x="90" y="316" text-anchor="middle" font-size="14" fill="#86EFAC">Sentinel · 8 checks</text>
    <text x="90" y="334" text-anchor="middle" font-size="14" fill="#86EFAC">poison · cluster fp</text>

    <text x="90" y="-20" text-anchor="middle" font-size="28" fill="#22C55E" font-weight="700">④ Safety</text>
    <text x="90" y="10"  text-anchor="middle" font-size="20" fill="#22C55E">scan + dedupe</text>
    <rect x="0" y="345" width="180" height="34" rx="17" fill="#1E293B" stroke="#22C55E" stroke-width="1.5"/>
    <text x="90" y="368" text-anchor="middle" font-size="15" fill="#22C55E" font-style="italic" font-weight="700">candidate · scanned</text>
  </g>

  <!-- arrow 4→5 -->
  <line x1="1040" y1="430" x2="1100" y2="430" stroke="#F7B538" stroke-width="3" marker-end="url(#arr09)"/>

  <!-- =================== STATION 5 — HITL INBOX =================== -->
  <g transform="translate(1085,260)">
    <rect x="0" y="80" width="170" height="180" rx="14" fill="url(#inbox09)" stroke="#5B21B6" stroke-width="3"/>
    <!-- Human silhouette -->
    <circle cx="40" cy="120" r="14" fill="#FFF8E7" stroke="#5B21B6" stroke-width="2"/>
    <path d="M 25 138 Q 25 165 40 165 Q 55 165 55 138" fill="#FFF8E7" stroke="#5B21B6" stroke-width="2"/>
    <!-- 5 action chips -->
    <g font-size="13" font-weight="700">
      <rect x="68"  y="105" width="92" height="25" rx="6" fill="#16A34A"/>
        <text x="114" y="123" text-anchor="middle" fill="#FFF8E7">✓ approve</text>
      <rect x="68"  y="135" width="92" height="25" rx="6" fill="#DC2626"/>
        <text x="114" y="153" text-anchor="middle" fill="#FFF8E7">✗ reject</text>
      <rect x="68"  y="165" width="92" height="25" rx="6" fill="#0EA5E9"/>
        <text x="114" y="183" text-anchor="middle" fill="#FFF8E7">✎ edit</text>
      <rect x="68"  y="195" width="92" height="25" rx="6" fill="#F59E0B"/>
        <text x="114" y="213" text-anchor="middle" fill="#FFF8E7">⏸ defer</text>
      <rect x="68"  y="225" width="92" height="25" rx="6" fill="#9333EA"/>
        <text x="114" y="243" text-anchor="middle" fill="#FFF8E7">🛡 quarantine</text>
    </g>
    <text x="85" y="-20" text-anchor="middle" font-size="28" fill="#C4B5FD" font-weight="700">⑤ Inbox</text>
    <text x="85" y="10"  text-anchor="middle" font-size="20" fill="#C4B5FD">human in the loop</text>
    <text x="85" y="285" text-anchor="middle" font-size="17" fill="#CBD5E1">a teammate reviews</text>
    <text x="85" y="307" text-anchor="middle" font-size="17" fill="#CBD5E1">in a single click</text>
    <rect x="5" y="335" width="160" height="34" rx="17" fill="#1E293B" stroke="#C4B5FD" stroke-width="1.5"/>
    <text x="85" y="358" text-anchor="middle" font-size="15" fill="#C4B5FD" font-style="italic" font-weight="700">staged</text>
  </g>

  <!-- arrow 5→6 -->
  <line x1="1255" y1="430" x2="1305" y2="430" stroke="#F7B538" stroke-width="3" marker-end="url(#arr09)"/>

  <!-- =================== STATION 6 — ACTIVE SKILL =================== -->
  <g transform="translate(1295,260)">
    <!-- golden book -->
    <rect x="0" y="80" width="95" height="135" rx="6" fill="url(#gold09)" stroke="#7C2D12" stroke-width="3"/>
    <line x1="0" y1="120" x2="95" y2="120" stroke="#7C2D12" stroke-width="1.5"/>
    <line x1="48" y1="80" x2="48" y2="215" stroke="#7C2D12" stroke-width="1.5" opacity="0.4"/>
    <text x="48" y="155" text-anchor="middle" font-size="32" fill="#7C2D12" font-weight="700">★</text>
    <!-- 3 mini agents drawing from it -->
    <g transform="translate(-15,225)">
      <circle cx="10" cy="0" r="9" fill="#A78BFA" stroke="#0B1020" stroke-width="1.5"/>
      <circle cx="55" cy="0" r="9" fill="#F472B6" stroke="#0B1020" stroke-width="1.5"/>
      <circle cx="100" cy="0" r="9" fill="#34D399" stroke="#0B1020" stroke-width="1.5"/>
      <line x1="10"  y1="-6" x2="40" y2="-30" stroke="#F7B538" stroke-width="2"/>
      <line x1="55"  y1="-9" x2="50" y2="-30" stroke="#F7B538" stroke-width="2"/>
      <line x1="100" y1="-6" x2="60" y2="-30" stroke="#F7B538" stroke-width="2"/>
    </g>
    <text x="48" y="-20" text-anchor="middle" font-size="28" fill="#FFE066" font-weight="700">⑥ Skill</text>
    <text x="48" y="10"  text-anchor="middle" font-size="20" fill="#FFE066">in production</text>
    <text x="48" y="280" text-anchor="middle" font-size="15" fill="#CBD5E1">every agent can</text>
    <text x="48" y="298" text-anchor="middle" font-size="15" fill="#CBD5E1">recall + run</text>
    <rect x="-32" y="320" width="160" height="34" rx="17" fill="#1E293B" stroke="#FFE066" stroke-width="1.5"/>
    <text x="48" y="343" text-anchor="middle" font-size="15" fill="#FFE066" font-style="italic" font-weight="700">active</text>
  </g>

  <!-- ============ Footer band: who acts where ============ -->
  <g transform="translate(0,720)">
    <rect x="60" y="0" width="1280" height="120" rx="14" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <text x="700" y="32" text-anchor="middle" font-size="20" fill="#FFF8E7" font-weight="700">Who acts at each station</text>
    <g font-size="16">
      <text x="140"  y="68" text-anchor="middle" fill="#22D3EE" font-weight="700">agents</text>
      <text x="140"  y="92" text-anchor="middle" fill="#94A3B8">(automatic)</text>
      <text x="380"  y="68" text-anchor="middle" fill="#06B6D4" font-weight="700">the lake</text>
      <text x="380"  y="92" text-anchor="middle" fill="#94A3B8">(automatic)</text>
      <text x="680"  y="68" text-anchor="middle" fill="#FB923C" font-weight="700">the forge resident</text>
      <text x="680"  y="92" text-anchor="middle" fill="#94A3B8">(automatic)</text>
      <text x="930"  y="68" text-anchor="middle" fill="#22C55E" font-weight="700">sentinel</text>
      <text x="930"  y="92" text-anchor="middle" fill="#94A3B8">(automatic)</text>
      <text x="1170" y="68" text-anchor="middle" fill="#C4B5FD" font-weight="700">a teammate · human</text>
      <text x="1170" y="92" text-anchor="middle" fill="#94A3B8">(the only step that asks)</text>
    </g>
  </g>
</svg>
