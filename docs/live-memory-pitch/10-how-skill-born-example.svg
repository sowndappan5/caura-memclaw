<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Kalam','Caveat','Patrick Hand','Comic Sans MS',cursive">
  <defs>
    <radialGradient id="lake10" cx="50%" cy="55%" r="65%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </radialGradient>
    <radialGradient id="forge10" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="60%"  stop-color="#F97316"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </radialGradient>
    <linearGradient id="card10" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE9B0"/>
    </linearGradient>
    <radialGradient id="gold10" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#FFF7B0"/>
      <stop offset="60%"  stop-color="#F7B538"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>
    <marker id="arr10" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#F7B538"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0B1020"/>

  <!-- Title -->
  <text x="700" y="58" text-anchor="middle" font-size="40" fill="#FFF8E7" font-weight="700">A Skill is Born — worked example</text>
  <text x="700" y="92" text-anchor="middle" font-size="22" fill="#F7B538" font-style="italic">"rerun-flaky-ci" · the same recipe three agents figured out independently</text>

  <!-- ============== STAGE 1 — THE LAKE ============== -->
  <g transform="translate(40,140)">
    <text x="0" y="0" font-size="26" fill="#22D3EE" font-weight="700">① The Lake — three agents, three weeks, the same problem</text>

    <!-- 3 session rows -->
    <g transform="translate(0,30)" font-size="15">
      <!-- Session 1: Ada -->
      <g transform="translate(0,0)">
        <circle cx="22" cy="22" r="14" fill="#A78BFA" stroke="#0B1020" stroke-width="2"/>
        <text x="22" y="27" text-anchor="middle" font-size="13" fill="#0B1020" font-weight="700">A</text>
        <text x="50" y="20" fill="#FFF8E7" font-weight="700">Ada</text>
        <text x="50" y="40" fill="#94A3B8">mon · "PR #482 test failed: re-ran job 3142 · passed · merged ✓ shipped"</text>
      </g>
      <!-- Session 2: Bo -->
      <g transform="translate(0,55)">
        <circle cx="22" cy="22" r="14" fill="#F472B6" stroke="#0B1020" stroke-width="2"/>
        <text x="22" y="27" text-anchor="middle" font-size="13" fill="#0B1020" font-weight="700">B</text>
        <text x="50" y="20" fill="#FFF8E7" font-weight="700">Bo</text>
        <text x="50" y="40" fill="#94A3B8">thu · "PR #501 flaked on test_payments · re-ran just that job · green · shipped ✓"</text>
      </g>
      <!-- Session 3: Cyrus -->
      <g transform="translate(0,110)">
        <circle cx="22" cy="22" r="14" fill="#34D399" stroke="#0B1020" stroke-width="2"/>
        <text x="22" y="27" text-anchor="middle" font-size="13" fill="#0B1020" font-weight="700">C</text>
        <text x="50" y="20" fill="#FFF8E7" font-weight="700">Cyrus</text>
        <text x="50" y="40" fill="#94A3B8">fri · "test_session_trace flaked again · re-ran job 4101 · passed · merged ✓ shipped"</text>
      </g>
    </g>

    <!-- shared entities tag row -->
    <g transform="translate(0,210)" font-size="13">
      <text x="0" y="0" fill="#CBD5E1">shared entities surface across all three:</text>
      <g transform="translate(0,12)">
        <rect x="0"   y="0" width="62" height="22" rx="11" fill="#075985" stroke="#22D3EE"/>
        <text x="31"  y="16" text-anchor="middle" fill="#FFF8E7">CI</text>
        <rect x="72"  y="0" width="78" height="22" rx="11" fill="#075985" stroke="#22D3EE"/>
        <text x="111" y="16" text-anchor="middle" fill="#FFF8E7">pytest</text>
        <rect x="160" y="0" width="74" height="22" rx="11" fill="#075985" stroke="#22D3EE"/>
        <text x="197" y="16" text-anchor="middle" fill="#FFF8E7">flaky</text>
        <rect x="244" y="0" width="90" height="22" rx="11" fill="#075985" stroke="#22D3EE"/>
        <text x="289" y="16" text-anchor="middle" fill="#FFF8E7">re-run job</text>
      </g>
    </g>
  </g>

  <!-- =================== STAGE 2 — OUTCOME INFERENCE =================== -->
  <g transform="translate(40,420)">
    <text x="0" y="0" font-size="26" fill="#06B6D4" font-weight="700">② Outcome Inference labels each session</text>

    <g transform="translate(0,20)" font-size="14">
      <!-- Ada: terminal=shipped → success -->
      <g transform="translate(0,0)">
        <rect x="0" y="0" width="350" height="40" rx="8" fill="#15803D" stroke="#22C55E"/>
        <text x="14"  y="25" fill="#FFF8E7" font-weight="700">Ada's trace:</text>
        <text x="110" y="25" fill="#FFF8E7">terminal="shipped" → SUCCESS · weight 0.9</text>
      </g>
      <g transform="translate(0,48)">
        <rect x="0" y="0" width="350" height="40" rx="8" fill="#15803D" stroke="#22C55E"/>
        <text x="14"  y="25" fill="#FFF8E7" font-weight="700">Bo's trace:</text>
        <text x="110" y="25" fill="#FFF8E7">terminal="shipped" → SUCCESS · weight 0.9</text>
      </g>
      <g transform="translate(0,96)">
        <rect x="0" y="0" width="350" height="40" rx="8" fill="#15803D" stroke="#22C55E"/>
        <text x="14"  y="25" fill="#FFF8E7" font-weight="700">Cyrus's trace:</text>
        <text x="110" y="25" fill="#FFF8E7">terminal="shipped" → SUCCESS · weight 0.9</text>
      </g>
    </g>

    <text x="0" y="180" font-size="14" fill="#94A3B8" font-style="italic">three independent SUCCESS labels — no one had to tell MemClaw</text>
  </g>

  <!-- ====== Arrow Lake/Outcome → Forge ====== -->
  <path d="M 400 350 Q 470 350 540 290" stroke="#F7B538" stroke-width="3" fill="none" marker-end="url(#arr10)"/>

  <!-- =================== STAGE 3 — THE FORGE =================== -->
  <g transform="translate(540,140)">
    <text x="200" y="0" text-anchor="middle" font-size="26" fill="#FB923C" font-weight="700">③ The Forge clusters + distills</text>

    <ellipse cx="200" cy="170" rx="180" ry="120" fill="url(#forge10)" stroke="#7C2D12" stroke-width="3"/>

    <!-- 3 traces feeding into one star -->
    <g>
      <circle cx="110" cy="120" r="14" fill="#A78BFA" stroke="#7C2D12" stroke-width="2"/>
      <text   x="110" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1020">A</text>
      <circle cx="200" cy="105" r="14" fill="#F472B6" stroke="#7C2D12" stroke-width="2"/>
      <text   x="200" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1020">B</text>
      <circle cx="290" cy="120" r="14" fill="#34D399" stroke="#7C2D12" stroke-width="2"/>
      <text   x="290" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1020">C</text>
      <line x1="110" y1="134" x2="200" y2="195" stroke="#7C2D12" stroke-width="2"/>
      <line x1="200" y1="119" x2="200" y2="195" stroke="#7C2D12" stroke-width="2"/>
      <line x1="290" y1="134" x2="200" y2="195" stroke="#7C2D12" stroke-width="2"/>
    </g>

    <!-- Fingerprint star -->
    <polygon points="200,170 213,205 250,210 222,232 232,268 200,250 168,268 178,232 150,210 187,205"
             fill="#FFE066" stroke="#7C2D12" stroke-width="2.5"/>
    <text x="200" y="222" text-anchor="middle" font-size="20" font-weight="700" fill="#7C2D12">fp:v1</text>
    <text x="200" y="248" text-anchor="middle" font-size="12"  font-weight="700" fill="#7C2D12">a3f9e2…</text>

    <!-- Gates summary -->
    <g transform="translate(0,320)" font-size="15">
      <text x="200" y="0" text-anchor="middle" fill="#FB923C" font-weight="700">gates passed</text>
      <text x="200" y="22" text-anchor="middle" fill="#FFF8E7">3 traces · 3 distinct agents · 7 days</text>
    </g>

    <!-- LLM distill -->
    <g transform="translate(0,375)" font-size="15">
      <text x="200" y="0" text-anchor="middle" fill="#FB923C" font-weight="700">LLM distills →</text>
      <rect x="20" y="14" width="360" height="36" rx="8" fill="#1E293B" stroke="#FB923C" stroke-width="2"/>
      <text x="200" y="38" text-anchor="middle" font-size="17" fill="#FFE066" font-weight="700">rerun-flaky-ci</text>
    </g>
  </g>

  <!-- ====== Arrow Forge → Safety ====== -->
  <path d="M 940 280 Q 1000 280 1015 350" stroke="#F7B538" stroke-width="3" fill="none" marker-end="url(#arr10)"/>

  <!-- =================== STAGE 4 — SAFETY =================== -->
  <g transform="translate(960,360)">
    <text x="120" y="0" text-anchor="middle" font-size="26" fill="#22C55E" font-weight="700">④ Safety</text>
    <!-- Shield -->
    <path d="M 120 28 L 200 50 L 200 150 Q 200 200 120 230 Q 40 200 40 150 L 40 50 Z"
          fill="#15803D" stroke="#14532D" stroke-width="3"/>
    <polyline points="70,130 105,170 175,100" fill="none" stroke="#FFF8E7" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="120" y="258" text-anchor="middle" font-size="15" fill="#86EFAC">Sentinel 8/8 clean</text>
    <text x="120" y="278" text-anchor="middle" font-size="15" fill="#86EFAC">fp not in poison table</text>
  </g>

  <!-- ====== Arrow Forge → Inbox ====== -->
  <path d="M 944 540 Q 1000 540 1020 590" stroke="#F7B538" stroke-width="3" fill="none" marker-end="url(#arr10)"/>

  <!-- =================== STAGE 5 — INBOX =================== -->
  <g transform="translate(950,600)">
    <text x="220" y="0" text-anchor="middle" font-size="26" fill="#C4B5FD" font-weight="700">⑤ HITL Inbox — Ran reviews the card</text>

    <!-- card -->
    <rect x="20" y="15" width="440" height="200" rx="14" fill="url(#card10)" stroke="#5B21B6" stroke-width="3"/>
    <text x="40" y="45" font-size="18" font-weight="700" fill="#1F2937">rerun-flaky-ci</text>
    <text x="40" y="68" font-size="13" fill="#1F2937">when a CI job fails on a known flaky test, re-trigger just that</text>
    <text x="40" y="84" font-size="13" fill="#1F2937">job (don't replay the pipeline); if it passes, merge.</text>

    <g font-size="11" transform="translate(40,98)">
      <rect x="0"   y="0" width="50" height="20" rx="10" fill="#7C3AED"/>
      <text x="25"  y="14" text-anchor="middle" fill="#FFF8E7">CI</text>
      <rect x="58"  y="0" width="60" height="20" rx="10" fill="#7C3AED"/>
      <text x="88"  y="14" text-anchor="middle" fill="#FFF8E7">pytest</text>
      <rect x="126" y="0" width="60" height="20" rx="10" fill="#7C3AED"/>
      <text x="156" y="14" text-anchor="middle" fill="#FFF8E7">flaky</text>
      <rect x="194" y="0" width="68" height="20" rx="10" fill="#7C3AED"/>
      <text x="228" y="14" text-anchor="middle" fill="#FFF8E7">devtools</text>
    </g>

    <text x="40" y="148" font-size="12" fill="#4B5563">evidence · 3 sessions · agents A, B, C · all SUCCESS</text>
    <text x="40" y="166" font-size="12" fill="#4B5563">scan: ✓ clean · fingerprint: a3f9e2…</text>

    <!-- Approve button glowing -->
    <rect x="280" y="135" width="160" height="46" rx="10" fill="#16A34A" stroke="#FFE066" stroke-width="3"/>
    <text x="360" y="164" text-anchor="middle" font-size="20" font-weight="700" fill="#FFF8E7">✓ Approve</text>
    <text x="360" y="200" text-anchor="middle" font-size="13" fill="#16A34A" font-style="italic">Ran clicks once.</text>
  </g>

  <!-- ====== Arrow Inbox → Active ====== -->
  <path d="M 940 800 Q 320 870 130 800" stroke="#F7B538" stroke-width="3" fill="none" marker-end="url(#arr10)"/>

  <!-- =================== STAGE 6 — ACTIVE =================== -->
  <g transform="translate(40,720)">
    <text x="0" y="0" font-size="26" fill="#FFE066" font-weight="700">⑥ Live in production — a week later</text>

    <!-- Golden book -->
    <rect x="0" y="20" width="80" height="115" rx="6" fill="url(#gold10)" stroke="#7C2D12" stroke-width="3"/>
    <line x1="0" y1="55" x2="80" y2="55" stroke="#7C2D12" stroke-width="1.5"/>
    <text x="40" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#7C2D12">rerun-</text>
    <text x="40" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#7C2D12">flaky-ci</text>
    <text x="40" y="125" text-anchor="middle" font-size="18" fill="#7C2D12" font-weight="700">★</text>

    <!-- New agent Dora -->
    <g transform="translate(120,40)">
      <circle cx="20" cy="20" r="16" fill="#FBBF24" stroke="#0B1020" stroke-width="2"/>
      <text x="20" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1020">D</text>
      <text x="50" y="18" font-size="16" fill="#FFF8E7" font-weight="700">Dora · new hire's first PR fails CI</text>
      <text x="50" y="40" font-size="14" fill="#94A3B8">→ memclaw_doc op=search "PR ci flaked"</text>
      <text x="50" y="60" font-size="14" fill="#94A3B8">→ finds <tspan font-weight="700" fill="#FFE066">rerun-flaky-ci</tspan> · follows it</text>
      <text x="50" y="82" font-size="14" fill="#22C55E" font-weight="700">→ green in 90 seconds. No one had to tell her.</text>
    </g>
  </g>

  <!-- footer -->
  <text x="700" y="876" text-anchor="middle" font-size="14" fill="#64748B" font-style="italic">
    same six stations as the high-level flow · one cluster · one fingerprint · one approval · one new shared playbook
  </text>
</svg>
